name: Node Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ["22.22.0"]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install node dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:units

  feature-tests:
    name: Feature Tests
    needs: unit-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ["22.22.0"]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install node dependencies
        run: npm ci
      - name: Run feature tests
        run: npm run test:features

  integration-tests:
    name: Integration Tests
    needs: feature-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ["22.22.0"]

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_DB: nodeapp
          POSTGRES_USER: nodeapp
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install node dependencies
        run: npm ci
      - name: Copy .env file
        run: cp .env-ci.example .env
      - name: Pre build test
        run: npm run prebuild
      - name: Run database migrations
        run: npm run db:deploy
      - name: Seed database
        run: npm run db:seed
      - name: Run integration tests
        run: npm run test:integrations

  build-test:
    name: Build Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ["22.22.0"]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install node dependencies
        run: npm ci
      - name: Copy .env file
        run: cp .env-ci.example .env
      - name: Build test
        run: npm run build
